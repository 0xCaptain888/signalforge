name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          if [ -n "${{ secrets.SKILL_PUBLIC_URL }}" ]; then
            curl -fsS "${{ secrets.SKILL_PUBLIC_URL }}/health" || echo "ping failed (service may be deploying)"
          else
            echo "SKILL_PUBLIC_URL secret not set — skipping"
          fi
